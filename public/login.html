<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--muted:#555570;--success:#4ade80;--error:#f87171}
body{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.4;animation:gridMove 20s linear infinite}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbFloat 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:var(--accent2);bottom:-50px;right:-50px;animation-delay:-4s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,20px)}}
.card{position:relative;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:420px;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 24px rgba(108,99,255,.4)}
.logo-text{font-family:'Space Mono',monospace;font-size:18px;font-weight:700}
.logo-text span{color:var(--accent)}
h1{font-size:26px;font-weight:600;margin-bottom:8px;letter-spacing:-.5px}
.sub{color:var(--muted);font-size:14px;margin-bottom:32px;font-weight:300}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:'Space Mono',monospace}
.field input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:all .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.field input::placeholder{color:var(--muted)}
.btn{width:100%;padding:15px;margin-top:8px;background:linear-gradient(135deg,var(--accent),#8b83ff);border:none;border-radius:10px;color:#fff;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px rgba(108,99,255,.5)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.status{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;text-align:center;display:none}
.status.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--error);display:block}
.status.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--success);display:block}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="card">
  <div class="logo"><div class="logo-icon">📧</div><div class="logo-text">Fast<span>Mailer</span></div></div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to launch your campaigns</p>
  <div class="field"><label>Username</label><input id="username" type="text" placeholder="Enter username"></div>
  <div class="field"><label>Password</label><input id="password" type="password" placeholder="Enter password"></div>
  <button class="btn" id="loginBtn">SIGN IN →</button>
  <div class="status" id="status"></div>
</div>
<script>
const btn=document.getElementById('loginBtn'),st=document.getElementById('status');
async function doLogin(){
  const u=document.getElementById('username').value.trim(),p=document.getElementById('password').value.trim();
  if(!u||!p){st.className='status error';st.textContent='Username and password required';return}
  btn.disabled=true;btn.textContent='SIGNING IN...';st.className='status';
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){st.className='status success';st.textContent='✅ Login successful!';setTimeout(()=>window.location.href='/launcher',800)}
    else{st.className='status error';st.textContent='❌ '+(d.message||'Invalid credentials');btn.disabled=false;btn.textContent='SIGN IN →'}
  }catch(e){st.className='status error';st.textContent='❌ Connection error';btn.disabled=false;btn.textContent='SIGN IN →'}
}
btn.addEventListener('click',doLogin);
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
