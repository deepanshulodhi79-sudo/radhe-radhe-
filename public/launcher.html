<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Mail Launcher</title>
<link rel="stylesheet" href="style.css">

<style>
  .logout-hint {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
</style>
</head>

<body>

<!-- ✅ FORM ADDED (important for file upload) -->
<form id="mailForm" enctype="multipart/form-data">

<div class="form-grid">
  <h2>📧 Fast Mail Launcher</h2>

  <div class="grid-row">
    <input id="senderName" name="senderName" placeholder="Sender Name">
    <input id="email" name="email" placeholder="Your Gmail">
  </div>

  <div class="grid-row">
    <input id="pass" name="password" type="password" placeholder="App Password">
    <input id="subject" name="subject" placeholder="Subject">
  </div>

  <div class="grid-row">
    <textarea id="message" name="message" placeholder="Message Body"></textarea>
    <textarea id="recipients" name="recipients" placeholder="Recipients (comma or newline)"></textarea>
  </div>

  <!-- ✅ NEW IMAGE INPUT -->
  <div class="grid-row">
    <input type="file" name="image" accept="image/*">
  </div>

  <div class="grid-row">
    <button type="submit" id="sendBtn">Send All</button>

    <div>
      <button type="button" id="logoutBtn" title="Double click to logout">Logout</button>
      <div class="logout-hint">Double-click to logout</div>
    </div>
  </div>

  <p id="statusMessage"></p>
</div>

</form>

<script src="script.js"></script>

<script>
/* ===============================
   SEND MAIL WITH IMAGE SUPPORT
================================ */

const form = document.getElementById("mailForm");
const statusMessage = document.getElementById("statusMessage");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  statusMessage.innerText = "⏳ Sending...";

  try {
    const res = await fetch("/send", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    statusMessage.innerText = data.message;

  } catch (err) {
    statusMessage.innerText = "❌ Error sending mail";
  }
});


/* ===============================
   DOUBLE-CLICK LOGOUT LOGIC
================================ */

const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("dblclick", () => {
  fetch("/logout", { method: "POST" })
    .then(res => res.json())
    .then(data => {
      alert(data.message);
      if (data.success) {
        window.location.href = "/";
      }
    })
    .catch(() => {
      alert("Logout failed");
    });
});
</script>

</body>
</html>
