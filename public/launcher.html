<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mail Launcher</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<form id="mailForm" enctype="multipart/form-data">

<div class="form-grid">
<h2>📧 Mail Launcher</h2>

<div class="grid-row">
<input name="senderName" placeholder="Name">
<input name="email" placeholder="Email">
</div>

<div class="grid-row">
<input name="password" placeholder="App Password">
<input name="subject" placeholder="Subject">
</div>

<div class="grid-row">
<div id="messageBox" class="message-box" contenteditable="true"></div>
<textarea name="recipients" placeholder="Recipients (comma or newline)"></textarea>
</div>

<input type="hidden" name="message" id="hiddenMessage">
<input type="file" id="imageInput" name="images" multiple hidden>

<div class="grid-row">
<button type="submit">Send</button>
</div>

<p id="statusMessage"></p>
</div>

</form>

<script>
const box = document.getElementById("messageBox");
const hiddenInput = document.getElementById("imageInput");
const hiddenMsg = document.getElementById("hiddenMessage");

let files = [];

// 🔥 MULTIPLE IMAGE PASTE
box.addEventListener("paste", (e) => {
  const items = e.clipboardData.items;

  for (let item of items) {
    if (item.type.includes("image")) {
      const file = item.getAsFile();
      files.push(file);

      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      box.appendChild(img);
    }
  }

  const dt = new DataTransfer();
  files.forEach(f => dt.items.add(f));
  hiddenInput.files = dt.files;
});

// 🔥 SEND MAIL
document.getElementById("mailForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  hiddenMsg.value = box.innerHTML;

  const formData = new FormData(e.target);

  const res = await fetch("/send", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("statusMessage").innerText = data.message;

  if (data.success) {
    alert("✅ Mail Sent Successfully");
  } else {
    alert("❌ Failed: " + data.message);
  }
});
</script>

</body>
</html>
