<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mail SaaS Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<form id="mailForm" enctype="multipart/form-data">

<div class="form-grid">
<h2>🚀 Mail SaaS Dashboard</h2>

<div class="grid-row">
<input name="senderName" placeholder="Sender Name">
<input name="email" placeholder="Your Gmail">
</div>

<div class="grid-row">
<input name="password" type="password" placeholder="App Password">
<input name="subject" placeholder="Subject">
</div>

<div class="grid-row">
<div id="messageBox" class="message-box" contenteditable="true"></div>
<textarea name="recipients" placeholder="Recipients"></textarea>
</div>

<input type="hidden" name="message" id="hiddenMessage">
<input type="file" id="imageInput" name="images" multiple hidden>

<div class="grid-row">
<button type="submit">🚀 Send Mail</button>
<button type="button" id="logoutBtn">🔓 Logout</button>
</div>

<p id="statusMessage"></p>

</div>
</form>

<script>
const form = document.getElementById("mailForm");
const box = document.getElementById("messageBox");
const hiddenMsg = document.getElementById("hiddenMessage");
const hiddenInput = document.getElementById("imageInput");

let files = [];

/* IMAGE PASTE */
box.addEventListener("paste", (e) => {
  const items = e.clipboardData.items;

  for (let item of items) {
    if (item.type.includes("image")) {
      const file = item.getAsFile();
      files.push(file);

      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      box.appendChild(img);
    }
  }

  const dt = new DataTransfer();
  files.forEach(f => dt.items.add(f));
  hiddenInput.files = dt.files;
});

/* SEND */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  hiddenMsg.value = box.innerHTML;

  const formData = new FormData(form);

  document.getElementById("statusMessage").innerText = "⏳ Sending...";

  const res = await fetch("/send", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("statusMessage").innerText = data.message;

  if (data.success) {
    alert("✅ Mail Sent Successfully");
  } else {
    alert("❌ Failed: " + data.message);
  }
});

/* LOGOUT */
document.getElementById("logoutBtn").addEventListener("click", () => {
  fetch("/logout", { method: "POST" })
    .then(() => window.location.href = "/");
});
</script>

</body>
</html>
