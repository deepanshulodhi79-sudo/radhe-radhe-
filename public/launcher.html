<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Mail Launcher</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<form id="mailForm" enctype="multipart/form-data">

<div class="form-grid">
<h2>📧 Fast Mail Launcher</h2>

<div class="grid-row">
<input id="senderName" name="senderName" placeholder="Sender Name">
<input id="email" name="email" placeholder="Your Gmail">
</div>

<div class="grid-row">
<input id="pass" name="password" type="password" placeholder="App Password">
<input id="subject" name="subject" placeholder="Subject">
</div>

<div class="grid-row">
<div id="messageBox" class="message-box" contenteditable="true"></div>
<textarea id="recipients" name="recipients" placeholder="Recipients (comma or newline)"></textarea>
</div>

<input type="hidden" name="message" id="hiddenMessage">
<input type="file" id="imageInput" name="images" multiple hidden>

<div class="grid-row">
<button type="submit">Send All</button>
<button type="button" id="logoutBtn">Logout</button>
</div>

<p id="statusMessage"></p>

</div>
</form>

<script>
const form = document.getElementById("mailForm");
const box = document.getElementById("messageBox");
const hiddenMsg = document.getElementById("hiddenMessage");
const hiddenInput = document.getElementById("imageInput");

let files = [];

// 🔥 IMAGE PASTE (multiple)
box.addEventListener("paste", (e) => {
  const items = e.clipboardData.items;

  for (let item of items) {
    if (item.type.includes("image")) {
      const file = item.getAsFile();
      files.push(file);

      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      box.appendChild(img);
    }
  }

  const dt = new DataTransfer();
  files.forEach(f => dt.items.add(f));
  hiddenInput.files = dt.files;
});

// 🔥 SEND MAIL (FIXED)
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  hiddenMsg.value = box.innerHTML;

  const formData = new FormData(form);

  document.getElementById("statusMessage").innerText = "⏳ Sending...";

  const res = await fetch("/send", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("statusMessage").innerText = data.message;

  if (data.success) {
    alert("✅ Mail Sent Successfully");
  } else {
    alert("❌ Failed: " + data.message);
  }
});

// 🔥 LOGOUT
document.getElementById("logoutBtn").addEventListener("click", () => {
  fetch("/logout", { method: "POST" })
    .then(() => window.location.href = "/");
});
</script>

</body>
</html>
