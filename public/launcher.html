<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--border2:#2a2a3e;--accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--muted:#555570;--success:#4ade80;--error:#f87171;--info:#60a5fa}
body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 6px 20px rgba(108,99,255,.35)}
.logo-text{font-family:'Space Mono',monospace;font-size:16px;font-weight:700}
.logo-text span{color:var(--accent)}
.logout-btn{padding:8px 16px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--error);color:var(--error)}
.status-bar{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;transition:all .3s;min-height:48px}
.status-bar.success{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05)}
.status-bar.error{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.05)}
.status-bar.sending{border-color:rgba(108,99,255,.4);background:rgba(108,99,255,.05)}
.status-icon{font-size:18px;flex-shrink:0}
.status-text{font-size:14px;font-weight:500}
.status-bar.success .status-text{color:var(--success)}
.status-bar.error .status-text{color:var(--error)}
.status-bar.sending .status-text{color:var(--accent)}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px}
.card-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.8px}
.field input,.field textarea{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.field input::placeholder,.field textarea::placeholder{color:var(--muted)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;transition:color .2s}
.toggle-pass:hover{color:var(--text)}
.recipients-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.badge{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:3px 10px;background:var(--accent);color:#fff;border-radius:20px;transition:background .3s}
textarea#messageBody{min-height:120px}
textarea#recipients{min-height:140px;font-size:13px}
.progress-wrap{display:none;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:20px}
.progress-bar{flex:1;height:6px;background:var(--border2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;width:0%;transition:width .3s ease}
.progress-text{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap}
.action-row{display:flex;gap:12px;margin-bottom:20px}
.send-btn{flex:1;padding:15px;background:linear-gradient(135deg,var(--accent),#8b83ff);border:none;border-radius:12px;color:#fff;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 30px rgba(108,99,255,.45)}
.send-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.clear-btn{padding:15px 20px;background:transparent;border:1px solid var(--border2);border-radius:12px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.clear-btn:hover{border-color:var(--error);color:var(--error)}
.log-box{display:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.log-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.log-clear{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;transition:color .2s;font-family:'Space Mono',monospace}
.log-clear:hover{color:var(--error)}
.log-list{padding:12px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.log-list::-webkit-scrollbar{width:4px}
.log-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;font-family:'Space Mono',monospace;animation:logIn .2s ease both}
@keyframes logIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.log-item.ok{background:rgba(74,222,128,.06);color:var(--success)}
.log-item.fail{background:rgba(248,113,113,.06);color:var(--error)}
.log-item.info{background:rgba(96,165,250,.06);color:var(--info)}
.tips{padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted);line-height:1.8}
.tips strong{color:var(--text);display:block;margin-bottom:6px;font-family:'Space Mono',monospace;font-size:11px}
@media(max-width:700px){.main-grid{grid-template-columns:1fr}body{padding:14px}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📧</div>
    <div class="logo-text">Fast<span>Mailer</span></div>
  </div>
  <button class="logout-btn" id="logoutBtn">⎋ LOGOUT</button>
</div>

<div class="status-bar" id="statusBar">
  <span class="status-icon" id="statusIcon">⚡</span>
  <span class="status-text" id="statusText">Ready to launch</span>
</div>

<div class="main-grid">
  <div class="card">
    <div class="card-title">⚙️ Sender Config</div>
    <div class="field"><label>Sender Name</label><input id="senderName" placeholder="e.g. John Doe"></div>
    <div class="field"><label>Gmail ID</label><input id="gmailId" type="email" placeholder="you@gmail.com"></div>
    <div class="field">
      <label>App Password</label>
      <div class="pass-wrap">
        <input id="appPassword" type="password" placeholder="Google App Password">
        <button class="toggle-pass" onclick="togglePass()">👁</button>
      </div>
    </div>
    <div class="field"><label>Subject</label><input id="subject" placeholder="Email subject line"></div>
    <div class="field"><label>Message Body</label><textarea id="messageBody" placeholder="Write your email content here..."></textarea></div>
  </div>

  <div class="card">
    <div class="card-title">👥 Recipients</div>
    <div class="field">
      <div class="recipients-header">
        <label style="margin-bottom:0">Email List</label>
        <span class="badge" id="recipientCount">0 recipients</span>
      </div>
      <textarea id="recipients" placeholder="alice@gmail.com&#10;bob@yahoo.com, carol@outlook.com" oninput="countRecipients()"></textarea>
    </div>
    <div class="tips">
      <strong>📋 TIPS</strong>
      Separate by comma or new line<br>
      Max <strong style="color:var(--accent)">50 recipients</strong> per batch<br>
      Use Gmail <strong style="color:var(--accent)">App Password</strong> (not account password)<br>
      Enable <strong style="color:var(--accent)">2FA</strong> on Gmail to generate App Password
    </div>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0 / 0</span>
</div>

<div class="action-row">
  <button class="send-btn" id="sendBtn" onclick="sendAll()"><span>🚀</span> SEND ALL</button>
  <button class="clear-btn" onclick="clearAll()">🗑 CLEAR ALL</button>
</div>

<div class="log-box" id="logBox">
  <div class="log-header">
    <span class="log-title">📋 Send Log</span>
    <button class="log-clear" onclick="clearLog()">✕ Clear</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<script>
function parseEmails(raw){return raw.split(/[\n,]+/).map(e=>e.trim().toLowerCase()).filter(e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e))}
function countRecipients(){const e=parseEmails(document.getElementById('recipients').value),b=document.getElementById('recipientCount');b.textContent=`${e.length} recipient${e.length!==1?'s':''}`;b.style.background=e.length>50?'#ef4444':'#6c63ff'}
function togglePass(){const i=document.getElementById('appPassword');i.type=i.type==='password'?'text':'password'}
function setStatus(t,icon,text){const b=document.getElementById('statusBar');b.className='status-bar '+t;document.getElementById('statusIcon').textContent=icon;document.getElementById('statusText').textContent=text}
function addLog(t,icon,msg){const lb=document.getElementById('logBox'),ll=document.getElementById('logList');lb.style.display='block';const i=document.createElement('div');i.className=`log-item ${t}`;i.innerHTML=`<span>${icon}</span><span>${msg}</span>`;ll.appendChild(i);lb.scrollTop=lb.scrollHeight}
function clearLog(){document.getElementById('logList').innerHTML='';document.getElementById('logBox').style.display='none'}
function setProgress(cur,tot){const w=document.getElementById('progressWrap');w.style.display='flex';const pct=tot>0?Math.round(cur/tot*100):0;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=`Sending ${cur} / ${tot}`}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function validate(){
  const fields=[{id:'senderName',label:'Sender Name'},{id:'gmailId',label:'Gmail ID'},{id:'appPassword',label:'App Password'},{id:'subject',label:'Subject'},{id:'messageBody',label:'Message Body'}];
  for(const f of fields){if(!document.getElementById(f.id).value.trim()){setStatus('error','❌',`${f.label} is required`);document.getElementById(f.id).focus();return false}}
  const emails=parseEmails(document.getElementById('recipients').value);
  if(emails.length===0){setStatus('error','❌','Add at least 1 valid recipient email');return false}
  if(emails.length>50){setStatus('error','❌','Max 50 recipients per batch');return false}
  return emails
}

async function sendAll(){
  const emails=validate();if(!emails)return;
  const senderName=document.getElementById('senderName').value.trim();
  const gmailId=document.getElementById('gmailId').value.trim();
  const appPassword=document.getElementById('appPassword').value.trim();
  const subject=document.getElementById('subject').value.trim();
  const messageBody=document.getElementById('messageBody').value.trim();
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.innerHTML='<span>⏳</span> SENDING...';
  clearLog();setStatus('sending','📤',`Sending to ${emails.length} recipients...`);setProgress(0,emails.length);
  let ok=0,fail=0;
  for(let i=0;i<emails.length;i++){
    try{
      const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({senderName,gmailId,appPassword,subject,messageBody,to:emails[i]})});
      const d=await res.json();
      if(res.ok&&d.success){ok++;addLog('ok','✅',`Delivered → ${emails[i]}`)}
      else{fail++;addLog('fail','❌',`Failed → ${emails[i]}`)}
    }catch{fail++;addLog('fail','❌',`Error → ${emails[i]}`)}
    setProgress(i+1,emails.length);
    if(i<emails.length-1)await sleep(200);
  }
  if(fail===0){setStatus('success','🎉',`All ${ok} emails sent successfully!`);addLog('ok','✅',`${ok} emails delivered successfully`)}
  else if(ok===0){setStatus('error','💥',`All ${fail} emails failed. Check credentials.`);addLog('fail','❌',`All ${fail} failed — check Gmail & App Password`)}
  else{setStatus('sending','⚠️',`${ok} sent, ${fail} failed`);addLog('ok','✅',`${ok} delivered`);addLog('fail','❌',`${fail} failed`)}
  addLog('info','📊',`Total: ${emails.length}  ·  ✅ ${ok} success  ·  ❌ ${fail} failed`);
  btn.disabled=false;btn.innerHTML='<span>🚀</span> SEND ALL';
}

function clearAll(){
  ['senderName','gmailId','appPassword','subject','messageBody','recipients'].forEach(id=>document.getElementById(id).value='');
  countRecipients();clearLog();document.getElementById('progressWrap').style.display='none';setStatus('','⚡','Ready to launch');
}

document.getElementById('logoutBtn').addEventListener('click',async()=>{
  if(!confirm('Logout karna chahte hain?'))return;
  await fetch('/logout',{method:'POST'});window.location.href='/';
});
</script>
</body>
</html>
